<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ideapp is a swipeable feed for posting, discovering, and voting on memorable activity ideas." />
  <title>Ideapp — Adventure Ideas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell" aria-label="Ideapp social idea feed">
    <header class="top-edge" aria-label="App navigation">
      <a class="brand" href="#top" aria-label="Ideapp home">
        <span class="brand-mark" aria-hidden="true"></span>
        Ideapp
      </a>
      <div class="top-actions">
        <select id="sortIdeas" aria-label="Sort idea feed">
          <option value="hot">Hot</option>
          <option value="new">New</option>
          <option value="split">Debated</option>
        </select>
        <button class="icon-button" id="openComposer" type="button" aria-label="Post a new idea">+</button>
      </div>
    </header>

    <section class="feed" id="ideaFeed" aria-label="Scrollable idea cards"></section>

    <aside class="right-edge" aria-label="Voting actions">
      <button class="action-button yes" id="yesButton" type="button" aria-label="Vote yes on current idea">
        <span aria-hidden="true">✓</span>
      </button>
      <button class="action-button no" id="noButton" type="button" aria-label="Vote no on current idea">
        <span aria-hidden="true">×</span>
      </button>
      <button class="action-button" id="seedButton" type="button" aria-label="Add sample ideas">
        <span aria-hidden="true">↻</span>
      </button>
    </aside>
  </main>

  <dialog class="composer" id="composerDialog" aria-labelledby="composerTitle">
    <form id="ideaForm" method="dialog">
      <div class="composer-head">
        <div>
          <p class="micro-label">Post to Ideapp</p>
          <h1 id="composerTitle">Drop an idea</h1>
        </div>
        <button class="close-button" id="closeComposer" type="button" aria-label="Close composer"><span aria-hidden="true">×</span></button>
      </div>

      <label for="title">Activity</label>
      <input id="title" name="title" maxlength="72" placeholder="Midnight bakery crawl" required />

      <label for="description">Why it could be memorable <span>optional</span></label>
      <textarea id="description" name="description" maxlength="280" placeholder="Add the little detail that makes this worth leaving the couch for."></textarea>

      <section class="tag-builder" aria-labelledby="tagBuilderTitle">
        <div class="tag-builder-head">
          <div>
            <label id="tagBuilderTitle">Tags</label>
            <p>Pick up to <strong id="tagLimit">5</strong> so people instantly get the vibe.</p>
          </div>
          <strong id="tagCount">0/5</strong>
        </div>

        <div class="tag-groups" id="tagGroups" aria-label="Suggested tags">
          <div class="tag-group" aria-label="Mood tags">
            <span>Mood</span>
            <button type="button" data-tag="Outdoors">Outdoors</button>
            <button type="button" data-tag="Food">Food</button>
            <button type="button" data-tag="Creative">Creative</button>
            <button type="button" data-tag="Night">Night</button>
            <button type="button" data-tag="Cozy">Cozy</button>
            <button type="button" data-tag="Adrenaline">Adrenaline</button>
          </div>
          <div class="tag-group" aria-label="Plan tags">
            <span>Plan</span>
            <button type="button" data-tag="5 minutes">5 minutes</button>
            <button type="button" data-tag="Easy">Easy</button>
            <button type="button" data-tag="All day">All day</button>
            <button type="button" data-tag="Plan ahead">Plan ahead</button>
            <button type="button" data-tag="No money">No money</button>
            <button type="button" data-tag="Road trip">Road trip</button>
          </div>
          <div class="tag-group" aria-label="People tags">
            <span>People</span>
            <button type="button" data-tag="Solo">Solo</button>
            <button type="button" data-tag="Date">Date</button>
            <button type="button" data-tag="Friends">Friends</button>
            <button type="button" data-tag="Family">Family</button>
          </div>
        </div>

        <div class="custom-tag-row">
          <input id="customTag" maxlength="18" placeholder="Add custom tag" aria-label="Add custom tag" />
          <button class="tag-add-button" id="addCustomTag" type="button">Add</button>
        </div>
        <input id="selectedTags" name="tags" type="hidden" />
      </section>

      <button class="submit-button" type="submit">Post idea</button>
    </form>
  </dialog>

  <template id="ideaTemplate">
    <article class="idea-slide">
      <div class="vote-fields" aria-hidden="true">
        <div class="vote-field vote-field-yes">YES</div>
        <div class="vote-field vote-field-no">NO</div>
      </div>
      <div class="idea-backdrop" aria-hidden="true"></div>
      <section class="idea-content">
        <div class="idea-copy">
          <div class="tags meta"></div>
          <h2></h2>
          <h3 class="legacy-title" hidden></h3>
          <p></p>
        </div>
        <div class="idea-stats">
          <span class="approval"></span>
          <span class="counts score"></span>
          <button class="delete legacy-delete" type="button" aria-hidden="true" tabindex="-1">delete</button>
        </div>
      </section>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
